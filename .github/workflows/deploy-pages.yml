name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  pull_request_target:
    types: [closed]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    if: github.event_name != 'pull_request_target' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          ref: main
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Validate structured theory data
        run: python tests/validate_examples.py
      - name: Build reference sites
        run: python scripts/build_all.py
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: public

  deploy:
    if: github.event_name != 'pull_request_target' || github.event.pull_request.merged == true
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
      - name: Checkout main for deployment receipt
        uses: actions/checkout@v6
        with:
          ref: main
      - name: Record successful deployment
        env:
          PAGE_URL: ${{ steps.deployment.outputs.page_url }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          mkdir -p deployment
          {
            echo "# Last successful deployment"
            echo
            echo "- Status: success"
            echo "- UTC time: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            echo "- Commit: $GITHUB_SHA"
            echo "- Site: $PAGE_URL"
            echo "- Workflow: $RUN_URL"
          } > deployment/LAST_SUCCESS.md
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add deployment/LAST_SUCCESS.md
          git commit -m "chore: record successful Pages deployment [skip ci]" || exit 0
          git push origin HEAD:main
